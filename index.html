<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excelerate QA Review Tool</title>
<!-- STEP 1: Replace with your Google OAuth Client ID from console.cloud.google.com -->
<meta name="google-client-id" content="646801420243-ubi8thg6m862ei1ngdkl7s753o1js6te.apps.googleusercontent.com">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --surface2: #F0EEE8;
  --border: #E2DED6;
  --border-strong: #C8C4BC;
  --text: #1A1916;
  --text-2: #5C5A54;
  --text-3: #9C9A94;
  --accent: #2D5A27;
  --accent-light: #EBF2EA;
  --accent-text: #1E3E1A;
  --t1: #1A3A6B;
  --t1-bg: #EBF0FA;
  --t2: #6B2D1A;
  --t2-bg: #FAF0EB;
  --warn: #9C6B00;
  --warn-bg: #FFF8E6;
  --danger: #9C1A1A;
  --danger-bg: #FDF0F0;
  --success: #1A6B3A;
  --success-bg: #EDFAF3;
  --radius: 8px;
  --radius-lg: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: .06em;
  color: var(--text);
}

.logo span {
  color: var(--accent);
}

.header-meta {
  display: flex;
  gap: 1rem;
  align-items: center;
}

.header-meta input {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  width: 160px;
}

.header-meta input:focus {
  outline: none;
  border-color: var(--accent);
}

.main {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.role-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.role-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: var(--surface);
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}

.role-btn:hover { border-color: var(--border-strong); color: var(--text); }
.role-btn.active {
  background: var(--text);
  border-color: var(--text);
  color: #fff;
}

.role-desc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .875rem 1.125rem;
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 1.5rem;
  line-height: 1.65;
}

.score-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}

.score-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: .875rem 1.125rem;
}

.score-cell-label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text-3);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.score-cell-val {
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.score-cell-val span {
  font-size: 14px;
  color: var(--text-3);
  font-weight: 400;
}

.prog-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 2rem;
}

.prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

.section-head {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}

.pillar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
}

.pillar-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .875rem 1.125rem;
  cursor: pointer;
  user-select: none;
  gap: 12px;
}

.pillar-head:hover { background: var(--bg); }

.pillar-head-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.pillar-track-pill {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.t1-pill { background: var(--t1-bg); color: var(--t1); }
.t2-pill { background: var(--t2-bg); color: var(--t2); }

.pillar-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pillar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.pillar-pts {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
}

.pillar-progress {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
}

.chevron {
  width: 16px;
  height: 16px;
  color: var(--text-3);
  transition: transform .2s;
  flex-shrink: 0;
}

.pillar.open .chevron { transform: rotate(180deg); }

.pillar-body {
  display: none;
  padding: 0 1.125rem 1rem;
  border-top: 1px solid var(--border);
}

.pillar.open .pillar-body { display: block; }

.checks { list-style: none; padding-top: .875rem; display: flex; flex-direction: column; gap: 8px; }

.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
}

.cb {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  background: var(--surface);
}

.cb.checked {
  background: var(--accent);
  border-color: var(--accent);
}

.cb.checked::after {
  content: '';
  display: block;
  width: 4px;
  height: 7px;
  border: 1.5px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translate(-0.5px, -1px);
}

.check-text { font-size: 13px; color: var(--text-2); line-height: 1.55; }
.check-text.done { color: var(--text-3); text-decoration: line-through; }

.note-field {
  margin-top: 12px;
}

.note-field label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 5px;
}

.note-field textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  resize: vertical;
  min-height: 64px;
  line-height: 1.5;
  transition: border .15s;
}

.note-field textarea:focus { outline: none; border-color: var(--accent); }
.note-field textarea::placeholder { color: var(--text-3); }

.overall-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.125rem;
  margin-top: 1.5rem;
}

.overall-section h3 {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}

.generate-btn {
  margin-top: 1rem;
  width: 100%;
  padding: 11px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.generate-btn:hover { background: #2D2C28; }
.generate-btn:disabled { background: var(--border-strong); cursor: not-allowed; }

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}

.generate-btn.loading .spinner { display: block; }
.generate-btn.loading .btn-text::after { content: '…'; }

@keyframes spin { to { transform: rotate(360deg); } }

.report-out {
  margin-top: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  display: none;
  white-space: pre-wrap;
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--text);
}

.report-out.visible { display: block; }

.report-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.action-btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}

.action-btn:hover { border-color: var(--border-strong); color: var(--text); }

.api-key-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: .75rem 1rem;
  background: var(--warn-bg);
  border: 1px solid #E6C55A;
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  font-size: 12.5px;
  color: var(--warn);
  flex-wrap: wrap;
}

.api-key-row input {
  flex: 1;
  min-width: 200px;
  border: 1px solid #E6C55A;
  border-radius: 6px;
  padding: 5px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  background: #fff;
  color: var(--text);
}

.api-key-row input:focus { outline: none; border-color: var(--warn); }

.error-msg {
  background: var(--danger-bg);
  border: 1px solid #F5C0C0;
  border-radius: var(--radius);
  padding: .75rem 1rem;
  color: var(--danger);
  font-size: 13px;
  margin-top: 10px;
  display: none;
}

.error-msg.visible { display: block; }

.google-auth-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: .75rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  font-size: 13px;
  color: var(--text-2);
  flex-wrap: wrap;
  justify-content: space-between;
}

.google-auth-row .auth-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.google-sign-in-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}

.google-sign-in-btn:hover { border-color: var(--border-strong); background: var(--bg); }

.google-sign-in-btn svg { flex-shrink: 0; }

.auth-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.auth-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border-strong);
  flex-shrink: 0;
}

.auth-dot.connected { background: var(--success); }

.gdoc-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border: 1px solid #1a73e8;
  border-radius: var(--radius);
  background: #fff;
  color: #1a73e8;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}

.gdoc-btn:hover { background: #f0f6ff; }
.gdoc-btn:disabled { opacity: .5; cursor: not-allowed; }

.gdoc-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid #1a73e8;
  border-radius: var(--radius);
  background: #e8f0fe;
  color: #1a73e8;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: all .15s;
}

.gdoc-link:hover { background: #d2e3fc; }

/* Responsive */
@media (max-width: 600px) {
  .app-header { padding: 0 1rem; flex-wrap: wrap; height: auto; padding: .75rem 1rem; gap: .5rem; }
  .score-strip { grid-template-columns: 1fr 1fr; }
  .main { padding: 1rem 1rem 3rem; }
  .header-meta { flex-wrap: wrap; gap: .5rem; }
  .header-meta input { width: 130px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">EXCELERATE <span>/ QA</span></div>
  <div class="header-meta">
    <input type="text" id="pea-name" placeholder="PEA name" />
    <input type="text" id="cohort-id" placeholder="Cohort / week" />
  </div>
</header>

<main class="main">

  <!-- Google OAuth -->
  <div class="google-auth-row" id="google-auth-row">
    <div class="auth-left">
      <div class="auth-dot" id="auth-dot"></div>
      <span id="auth-status-text">Not signed in to Google</span>
    </div>
    <button class="google-sign-in-btn" id="google-sign-in-btn" onclick="handleGoogleSignIn()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- API key notice -->
  <div class="api-key-row">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Gemini API key — get yours free at <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--warn);font-weight:500">aistudio.google.com/apikey</a>. For production, move to your backend.</span>
    <input type="password" id="api-key" placeholder="AIza…" />
  </div>

  <!-- Role selector -->
  <div class="section-head">Reviewing as</div>
  <div class="role-row" id="role-row"></div>
  <div class="role-desc" id="role-desc"></div>

  <!-- Scores -->
  <div class="score-strip">
    <div class="score-cell">
      <div class="score-cell-label">Checks done</div>
      <div class="score-cell-val"><span id="done-n">0</span><span> / <span id="total-n">0</span></span></div>
    </div>
    <div class="score-cell">
      <div class="score-cell-label">Est. score</div>
      <div class="score-cell-val"><span id="pts-n">0</span><span> / <span id="pts-total-n">0</span> pts</span></div>
    </div>
    <div class="score-cell">
      <div class="score-cell-label">Completion</div>
      <div class="score-cell-val"><span id="pct-n">0</span><span>%</span></div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <!-- Pillars -->
  <div class="section-head">Pillars</div>
  <div id="pillars-wrap"></div>

  <!-- Overall notes + generate -->
  <div class="overall-section">
    <h3>Overall reviewer notes</h3>
    <textarea id="overall-notes" placeholder="Add summary observations, flags, or recommendations…" style="width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);resize:vertical;min-height:80px;line-height:1.5"></textarea>
    <button class="generate-btn" id="gen-btn" onclick="generateReport()">
      <div class="spinner"></div>
      <span class="btn-text">Generate QA report</span>
    </button>
    <div class="error-msg" id="err-msg"></div>
  </div>

  <!-- Report output -->
  <div class="report-out" id="report-out"></div>
  <div class="report-actions" id="report-actions" style="display:none">
    <button class="action-btn" onclick="copyReport()">Copy report</button>
    <button class="action-btn" onclick="printReport()">Print / save PDF</button>
    <button class="gdoc-btn" id="gdoc-btn" onclick="saveToGoogleDoc()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Save to Google Doc
    </button>
    <a class="gdoc-link" id="gdoc-link" href="#" target="_blank" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Doc
    </a>
  </div>

</main>

<script>
const ROLES = {
  qa: {
    label: 'QA Reviewer',
    desc: 'You are auditing PEA work independently. Review evidence — recordings, sheets, Space messages — and score each pillar. Write reviewer notes and share the final report with the PEA and manager.',
    pillars: [
      { id:'t11', track:'T1', name:'Meeting quality (OBM/WAM/TCM)', pts:24, checks:[
        'Cross-check calendar invite vs actual meeting date for all 3 types',
        'Review WAM slide version history — confirm slides were updated before each session',
        'Confirm OBM dry run appears on calendar',
        'Check Google Space recording post timestamp — within 24 hrs of each meeting',
        'Spot-audit 5 attendance rows vs Apps Script responses'
      ]},
      { id:'t12', track:'T1', name:'Tracking sheet accuracy', pts:12, checks:[
        'Random audit 5 intern rows — check all 4 week columns for blanks',
        'Check form columns: Peer Eval, Self-Eval, Feedback all marked',
        'Compare Moderator Panel entries vs tracking sheet — flag mismatches',
        'Verify Reflective Video is tracked in the Feedback Form column'
      ]},
      { id:'t13', track:'T1', name:'Communication quality', pts:10, checks:[
        'Spot-check 2–3 outgoing email headers — confirm Gmail alias used, not Vempower ID',
        'Compare Space messages vs approved template library',
        'Review Space threads for queries older than 48 hrs — flag any unanswered',
        'Check inactive email timestamp vs flag date — must be within 48 hrs'
      ]},
      { id:'t14', track:'T1', name:'Sub-team setup & management', pts:14, checks:[
        'Check Google Space creation timestamp — must be within 24 hrs of OBM',
        'Count members in each Space — flag if >8 or <7',
        'Verify poppy is a member of every sub-team Space',
        'Confirm DA availability was confirmed before TCM was scheduled',
        'Check welcome messages used approved templates'
      ]},
      { id:'t21', track:'T2', name:'Driving weekly deliverable submissions', pts:15, checks:[
        'Calculate avg completion rate: Submitted ÷ Enrolled × 100 across Weeks 1–4',
        'Review WAM slide reminder quality — are reminders clear and motivating?',
        'Check if follow-up messages were sent in Spaces when rate dipped',
        'Apply scoring: ≥90%=15 | 80–89%=12 | 70–79%=9 | 60–69%=6 | <60%=0–3'
      ]},
      { id:'t22', track:'T2', name:'OBM invite & welcome quality', pts:8, checks:[
        'Calculate attendance rate: Attended ÷ Registered × 100 — flag if <80%',
        'Review OBM invite message — was a calendar link included?',
        'Confirm reminder was sent 24–48 hrs before OBM',
        'Review recording snippet — assess whether session tone was welcoming'
      ]},
      { id:'t23', track:'T2', name:'Collecting 360° evaluations & feedback forms', pts:10, checks:[
        'Calculate submission rate: Submitted ÷ Eligible × 100 across all 3 form types',
        'Check if correct form links were shared in Spaces with deadline reminders',

let currentRole = 'qa';
let checked = {};
let notes = {};

function setRole(r) {
  currentRole = r;
  checked = {};
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.role === r);
  });
  document.getElementById('role-desc').textContent = ROLES[r].desc;
  renderPillars();
  updateScores();
}

function renderRoles() {
  const row = document.getElementById('role-row');
  row.innerHTML = '';
  Object.entries(ROLES).forEach(([key, val]) => {
    const b = document.createElement('button');
    b.className = 'role-btn' + (key === currentRole ? ' active' : '');
    b.dataset.role = key;
    b.textContent = val.label;
    b.onclick = () => setRole(key);
    row.appendChild(b);
  });
}

function renderPillars() {
  const wrap = document.getElementById('pillars-wrap');
  wrap.innerHTML = '';
  const pillars = ROLES[currentRole].pillars;
  pillars.forEach(p => {
    const div = document.createElement('div');
    div.className = 'pillar open';
    div.id = 'pillar_' + p.id;

    const checksHTML = p.checks.map((c, i) => {
      const key = p.id + '_' + i;
      const done = !!checked[key];
      return `<li class="check-item" onclick="toggle('${p.id}',${i})">
        <div class="cb${done ? ' checked' : ''}" id="cb_${key}"></div>
        <span class="check-text${done ? ' done' : ''}" id="ct_${key}">${c}</span>
      </li>`;
    }).join('');

    div.innerHTML = `
      <div class="pillar-head" onclick="togglePillar('${p.id}')">
        <div class="pillar-head-left">
          <span class="pillar-track-pill ${p.track === 'T1' ? 't1-pill' : 't2-pill'}">${p.track}</span>
          <span class="pillar-name">${p.name}</span>
        </div>
        <div class="pillar-right">
          <span class="pillar-progress" id="pp_${p.id}">0/${p.checks.length}</span>
          <span class="pillar-pts">max ${p.pts} pts</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="pillar-body">
        <ul class="checks">${checksHTML}</ul>
        <div class="note-field">
          <label>Pillar notes</label>
          <textarea placeholder="Observations, evidence reviewed, flags…" oninput="notes['${p.id}']=this.value">${notes[p.id] || ''}</textarea>
        </div>
      </div>`;
    wrap.appendChild(div);
  });
}

function togglePillar(id) {
  document.getElementById('pillar_' + id).classList.toggle('open');
}

function toggle(pid, i) {
  const key = pid + '_' + i;
  checked[key] = !checked[key];
  document.getElementById('cb_' + key)?.classList.toggle('checked', checked[key]);
  document.getElementById('ct_' + key)?.classList.toggle('done', checked[key]);
  updatePillarProgress(pid);
  updateScores();
}

function updatePillarProgress(pid) {
  const p = ROLES[currentRole].pillars.find(x => x.id === pid);
  if (!p) return;
  const done = p.checks.filter((_, i) => checked[pid + '_' + i]).length;
  const el = document.getElementById('pp_' + pid);
  if (el) el.textContent = done + '/' + p.checks.length;
}

function updateScores() {
  const pillars = ROLES[currentRole].pillars;
  let totalC = 0, doneC = 0, totalP = 0, doneP = 0;
  pillars.forEach(p => {
    totalC += p.checks.length;
    totalP += p.pts;
    const d = p.checks.filter((_, i) => checked[p.id + '_' + i]).length;
    doneC += d;
    doneP += Math.round(p.pts * d / p.checks.length);
  });
  document.getElementById('done-n').textContent = doneC;
  document.getElementById('total-n').textContent = totalC;
  document.getElementById('pts-n').textContent = doneP;
  document.getElementById('pts-total-n').textContent = totalP;
  const pct = totalC ? Math.round(doneC / totalC * 100) : 0;
  document.getElementById('pct-n').textContent = pct;
  document.getElementById('prog').style.width = pct + '%';
}

async function generateReport() {
  const apiKey = document.getElementById('api-key').value.trim();
  const errEl = document.getElementById('err-msg');
  errEl.classList.remove('visible');

  if (!apiKey) {
    errEl.textContent = 'Please enter your Gemini API key above. Get one free at aistudio.google.com/apikey';
    errEl.classList.add('visible');
    return;
  }

  const pillars = ROLES[currentRole].pillars;
  const peaName = document.getElementById('pea-name').value.trim() || 'Not specified';
  const cohort = document.getElementById('cohort-id').value.trim() || 'Not specified';
  const overallNotes = document.getElementById('overall-notes').value.trim() || 'None';
  const role = ROLES[currentRole].label;

  const pillarSummary = pillars.map(p => {
    const done = p.checks.filter((_, i) => checked[p.id + '_' + i]).length;
    const estScore = Math.round(p.pts * done / p.checks.length);
    const completedChecks = p.checks.filter((_, i) => checked[p.id + '_' + i]);
    const missedChecks = p.checks.filter((_, i) => !checked[p.id + '_' + i]);
    return `${p.name} (Track ${p.track}, Max ${p.pts} pts)
  Checks completed: ${done}/${p.checks.length} — Estimated score: ${estScore}/${p.pts}
  Completed: ${completedChecks.length ? completedChecks.map(c => '• ' + c).join('; ') : 'None'}
  Missed: ${missedChecks.length ? missedChecks.map(c => '• ' + c).join('; ') : 'None'}
  Reviewer notes: ${notes[p.id] || 'None'}`;
  }).join('\n\n');

  const prompt = `You are a QA reviewer for Excelerate, an internship program. Generate a professional, structured QA performance report based on the following checklist data.

PEA Name: ${peaName}
Cohort / Week: ${cohort}
Reviewed by role: ${role}
Review date: ${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}

PILLAR-BY-PILLAR RESULTS:
${pillarSummary}

OVERALL REVIEWER NOTES:
${overallNotes}

Write the report in this format:
1. REVIEW SUMMARY — 2–3 sentences covering overall performance and the headline finding.
2. PILLAR BREAKDOWN — For each pillar, one short paragraph: state the estimated score, what was done well, and what was missed (if anything). Be specific and evidence-based.
3. KEY STRENGTHS — 2–3 bullet points naming specific strengths with brief justification.
4. AREAS FOR IMPROVEMENT — 2–3 bullet points naming specific gaps with a concrete coaching recommendation for each.
5. FINAL SCORE — State the estimated total score out of the maximum possible, and a one-line overall verdict.

Tone: professional, direct, and constructive. Written for the PEA and their manager to read together.`;

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 1200, temperature: 0.4 }
      })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error.message || 'Gemini API error');
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const out = document.getElementById('report-out');
    out.textContent = text;
    out.classList.add('visible');
    document.getElementById('report-actions').style.display = 'flex';
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (e) {
    errEl.textContent = 'Error: ' + (e.message || 'Could not generate report. Check your Gemini API key and network.');
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function copyReport() {
  const text = document.getElementById('report-out').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy report', 1500);
  });
}

function printReport() {
  window.print();
}

const GOOGLE_CLIENT_ID = document.querySelector('meta[name="google-client-id"]').content;
const DOCS_SCOPE = 'https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive.file';

let googleAccessToken = null;
let tokenClient = null;

function initGoogleAuth() {
  if (!window.google || GOOGLE_CLIENT_ID.startsWith('YOUR_')) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DOCS_SCOPE,
    callback: (resp) => {
      if (resp.error) { showAuthStatus(false); return; }
      googleAccessToken = resp.access_token;
      showAuthStatus(true);
    }
  });
}

function handleGoogleSignIn() {
  if (!window.google) {
    alert('Google sign-in script not loaded. Check your internet connection or configure your Client ID.');
    return;
  }
  if (!tokenClient) initGoogleAuth();
  if (!tokenClient) {
    alert('Replace YOUR_GOOGLE_CLIENT_ID in the <meta> tag with your real OAuth Client ID from console.cloud.google.com');
    return;
  }
  if (googleAccessToken) {
    googleAccessToken = null;
    showAuthStatus(false);
  } else {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }
}

async function saveToGoogleDoc() {
  const reportText = document.getElementById('report-out').textContent;
  if (!reportText) return;

  if (!googleAccessToken) {
    alert('Please sign in to Google first using the button at the top of the page.');
    return;
  }

  const btn = document.getElementById('gdoc-btn');
  btn.disabled = true;
  btn.textContent = 'Creating doc…';

  const peaName = document.getElementById('pea-name').value.trim() || 'PEA';
  const cohort = document.getElementById('cohort-id').value.trim() || 'Cohort';
  const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const docTitle = `QA Report — ${peaName} — ${cohort} — ${dateStr}`;

  try {
    // Step 1: Create the document
    const createRes = await fetch('https://docs.googleapis.com/v1/documents', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + googleAccessToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ title: docTitle })
    });

    if (!createRes.ok) throw new Error('Failed to create Google Doc. Check your OAuth scopes.');
    const doc = await createRes.json();
    const docId = doc.documentId;

    // Step 2: Build structured content requests
    const lines = reportText.split('\n');
    const requests = [];
    let insertIndex = 1;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const isLast = i === lines.length - 1;
      const text = isLast ? line : line + '\n';

      requests.push({
        insertText: { location: { index: insertIndex }, text }
      });

      // Style headings (lines that are ALL CAPS or start with a number + dot)
      const isHeading = /^[A-Z\s\d.&°–—]{6,}$/.test(line.trim()) || /^\d+\./.test(line.trim());
      if (isHeading && line.trim().length > 0) {
        requests.push({
          updateParagraphStyle: {
            range: { startIndex: insertIndex, endIndex: insertIndex + line.length },
            paragraphStyle: { namedStyleType: 'HEADING_2' },
            fields: 'namedStyleType'
          }
        });
      }

      insertIndex += text.length;
    }

    // Step 3: Batch update with content
    const updateRes = await fetch(`https://docs.googleapis.com/v1/documents/${docId}:batchUpdate`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + googleAccessToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ requests })
    });

    if (!updateRes.ok) throw new Error('Failed to write content to Google Doc.');

    // Step 4: Show link
    const docUrl = `https://docs.google.com/document/d/${docId}/edit`;
    const linkEl = document.getElementById('gdoc-link');
    linkEl.href = docUrl;
    linkEl.style.display = 'inline-flex';
    linkEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    btn.textContent = 'Saved to Google Doc';
    btn.style.color = 'var(--success)';
    btn.style.borderColor = 'var(--success)';

  } catch (e) {
    alert('Error saving to Google Doc: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Save to Google Doc';
  }
}
